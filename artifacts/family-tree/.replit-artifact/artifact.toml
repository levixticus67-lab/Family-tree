kind = "web"
previewPath = "/"
title = "Family Tree Platform"
version = "1.0.0"
id = "artifacts/family-tree"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22551

[services.development]
run = "pnpm --filter @workspace/family-tree run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-tree", "run", "build" ]
publicDir = "artifacts/family-tree/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22551"
BASE_PATH = "/"
